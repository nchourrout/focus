name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Opt JavaScript actions into Node 24 ahead of the runner default flip so the
  # workflow doesn't log Node 20 deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    # macos-15 ships Xcode 16+, which provides the Swift Testing framework
    # our tests rely on (`import Testing`). macos-14 is on Xcode 15 / Swift 5.10.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift / Xcode versions
        run: |
          swift --version
          xcodebuild -version
      - name: Build
        run: swift build -c release
      - name: Run unit tests
        run: swift test
